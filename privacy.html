<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy | Nomad Neuroscience</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://unpkg.com https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnfonts.com; font-src 'self' https://fonts.gstatic.com https://cdnfonts.com; img-src 'self' data: https:; connect-src 'self' https:;">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <link rel="icon" type="image/svg+xml" href="favicon.svg?v=2">
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nomad: {
                            black: '#0A0A0A',
                            dark: '#1C1B1A',
                            base: '#FAFAFA',
                            cream: '#F5F5F0',
                            white: '#FFFFFF',
                            pink: '#FF1B8D',
                            magenta: '#E91E8C',
                            coral: '#FF6B6B',
                            peach: '#FFB4A2',
                            accent: '#7D7671'
                        }
                    },
                    fontFamily: {
                        sans: ['PP Neue Montreal', 'IBM Plex Sans', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                        serif: ['Newsreader', 'Georgia', 'serif'],
                        display: ['PP Neue Montreal', 'IBM Plex Sans', 'sans-serif'],
                        tech: ['IBM Plex Sans', 'ui-monospace', 'monospace'],
                    },
                    animation: {
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                    },
                    keyframes: {
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '20%, 60%': { transform: 'translateX(-5px)' },
                            '40%, 80%': { transform: 'translateX(5px)' },
                        }
                    }
                }
            }
        }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=IBM+Plex+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/pp-neue-montreal" rel="stylesheet">
    <style>
        body {
            font-family: "PP Neue Montreal", sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #F5F5F0;
            color: #0A0A0A;
        }

        .italic, i, em {
            font-family: 'Newsreader', Georgia, serif;
            font-style: italic;
        }

        .font-display { font-family: "PP Neue Montreal", sans-serif; }
    </style>
</head>
<body class="bg-nomad-cream text-nomad-black selection:bg-nomad-pink selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- ICONS --- */
        const IconWrapper = ({ children, size = 24, color = "currentColor", className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Menu = (props) => <IconWrapper {...props}><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></IconWrapper>;

        /* --- UTILITIES --- */
        const useScrollPosition = () => {
            const [scrollPosition, setScrollPosition] = useState(0);
            useEffect(() => {
                const updatePosition = () => setScrollPosition(window.scrollY);
                window.addEventListener('scroll', updatePosition);
                return () => window.removeEventListener('scroll', updatePosition);
            }, []);
            return scrollPosition;
        };

        const Magnetic = ({ children, className = "" }) => {
            const ref = useRef(null);
            const [position, setPosition] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const element = ref.current;
                if (!element || window.matchMedia("(pointer: coarse)").matches) return;

                const handleMouseMove = (e) => {
                    const { clientX, clientY } = e;
                    const { left, top, width, height } = element.getBoundingClientRect();
                    const x = (clientX - (left + width / 2)) * 0.3;
                    const y = (clientY - (top + height / 2)) * 0.3;
                    setPosition({ x, y });
                };

                const handleMouseLeave = () => {
                    setPosition({ x: 0, y: 0 });
                };

                element.addEventListener("mousemove", handleMouseMove);
                element.addEventListener("mouseleave", handleMouseLeave);

                return () => {
                    element.removeEventListener("mousemove", handleMouseMove);
                    element.removeEventListener("mouseleave", handleMouseLeave);
                };
            }, []);

            return (
                <div 
                    ref={ref} 
                    className={`inline-block transition-transform duration-300 ease-out will-change-transform ${className}`} 
                    style={{ transform: `translate3d(${position.x}px, ${position.y}px, 0)` }}
                >
                    {children}
                </div>
            );
        };

        const LoadingScreen = ({ onComplete }) => {
            const [phase, setPhase] = useState(0); 
            useEffect(() => {
                document.body.style.overflow = 'hidden';
                const revealTimer = setTimeout(() => setPhase(1), 800);
                const splitTimer = setTimeout(() => setPhase(2), 2000);
                const completeTimer = setTimeout(() => {
                    document.body.style.overflow = 'auto';
                    onComplete();
                }, 2800);
                return () => {
                    clearTimeout(revealTimer);
                    clearTimeout(splitTimer);
                    clearTimeout(completeTimer);
                    document.body.style.overflow = 'auto';
                };
            }, [onComplete]);
            return (
                <div className="fixed inset-0 z-[150] pointer-events-none flex flex-col">
                    <div className={`absolute top-0 left-0 w-full h-[50vh] bg-nomad-pink transition-transform duration-[800ms] ease-[cubic-bezier(0.76,0,0.24,1)] border-b border-white/5 ${phase === 2 ? '-translate-y-full' : 'translate-y-0'}`} />
                    <div className={`absolute bottom-0 left-0 w-full h-[50vh] bg-nomad-pink transition-transform duration-[800ms] ease-[cubic-bezier(0.76,0,0.24,1)] border-t border-white/5 ${phase === 2 ? 'translate-y-full' : 'translate-y-0'}`} />
                    <div className={`absolute inset-0 flex items-center justify-center transition-opacity duration-500 ${phase === 2 ? 'opacity-0' : 'opacity-100'}`}>
                        <div className="flex items-center text-4xl md:text-5xl lg:text-7xl font-light text-white tracking-tight font-display lowercase overflow-hidden">
                            <span>n</span>
                            <div className={`transition-all duration-[1000ms] ease-[cubic-bezier(0.22,1,0.36,1)] overflow-hidden flex ${phase >= 1 ? 'max-w-[300px] opacity-100' : 'max-w-0 opacity-0'}`}>
                                <span>omad</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const Navbar = ({ onWaitlistClick }) => {
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
            const [isDark, setIsDark] = useState(false);

            useEffect(() => {
                const checkTheme = () => {
                    const navbarElement = document.querySelector('.navbar-container');
                    if (!navbarElement) return;
                    
                    const rect = navbarElement.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    
                    const elements = document.elementsFromPoint(centerX, centerY);
                    const darkSection = elements.find(el => el.closest('[data-theme="dark"]'));
                    setIsDark(!!darkSection);
                };

                window.addEventListener('scroll', checkTheme);
                window.addEventListener('resize', checkTheme);
                checkTheme();

                return () => {
                    window.removeEventListener('scroll', checkTheme);
                    window.removeEventListener('resize', checkTheme);
                };
            }, []);

            return (
                <>
                    <div className="navbar-container fixed top-8 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-4 w-full px-4 select-none">
                        <div className="flex items-center gap-2.5 w-full max-w-[750px]">
                            {/* Logo Circle */}
                            <Magnetic>
                                <a 
                                    href="/" 
                                    className={`group flex-shrink-0 w-14 h-14 md:w-16 md:h-16 rounded-full backdrop-blur-md flex items-center justify-center hover:scale-110 transition-all duration-500 hover:bg-[url('button_back_2.png')] bg-cover bg-center ${isDark ? 'bg-white/10' : 'bg-white/53'}`}
                                >
                                    <span className={`font-serif italic text-2xl md:text-3xl mt-[-2px] transition-colors duration-500 ${isDark ? 'text-white' : 'text-nomad-pink group-hover:text-white'}`}>n</span>
                                </a>
                            </Magnetic>

                            {/* Nav Pill */}
                            <nav className={`flex-1 h-14 md:h-16 rounded-[22px] md:rounded-[26px] backdrop-blur-md flex items-center justify-between px-6 md:px-10 transition-all duration-500 ${isDark ? 'bg-white/10' : 'bg-white/53'}`}>
                                <div className={`hidden md:flex flex-1 items-center justify-around gap-6 text-[14px] font-light transition-colors duration-500 ${isDark ? 'text-white' : 'text-black/80'}`}>
                                    <a href="/#platform" className="hover:opacity-50 transition-opacity">Platform</a>
                                    <a href="/#applications" className="hover:opacity-50 transition-opacity">Applications</a>
                                    <a href="/#technology" className="hover:opacity-50 transition-opacity">Technology</a>
                                    <a href="/#team" className="hover:opacity-50 transition-opacity">Team</a>
                                </div>

                                <button
                                    className={`md:hidden p-1 flex items-center ml-auto transition-colors duration-500 ${isDark ? 'text-white' : 'text-black'}`}
                                    onClick={() => setMobileMenuOpen(!mobileMenuOpen)}
                                >
                                    {mobileMenuOpen ? <X size={20} /> : <Menu size={20} />}
                                </button>
                            </nav>
                        </div>
                    </div>

                    <div className={`fixed inset-0 z-40 bg-white/98 backdrop-blur-xl pt-32 px-10 transition-all duration-700 ease-[cubic-bezier(0.22,1,0.36,1)] lg:hidden ${mobileMenuOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                        <div className="flex flex-col gap-6 text-4xl font-light text-nomad-black">
                            <a href="/#platform" onClick={() => setMobileMenuOpen(false)} className="border-b border-black/5 pb-6">Platform</a>
                            <a href="/#applications" onClick={() => setMobileMenuOpen(false)} className="border-b border-black/5 pb-6">Applications</a>
                            <a href="/#technology" onClick={() => setMobileMenuOpen(false)} className="border-b border-black/5 pb-6">Technology</a>
                            <a href="/#team" onClick={() => setMobileMenuOpen(false)} className="border-b border-black/5 pb-6">Team</a>
                            <a href="signin" onClick={() => setMobileMenuOpen(false)} className="text-2xl pt-4 text-nomad-black/50">Partner Portals</a>
                            <button 
                                onClick={() => { onWaitlistClick(); setMobileMenuOpen(false); }} 
                                className="mt-6 py-5 bg-nomad-black text-white text-xl font-bold rounded-2xl uppercase tracking-widest"
                            >
                                Secure Access
                            </button>
                        </div>
                    </div>
                </>
            );
        };


        const WaitlistModal = ({ isOpen, onClose }) => {
            const [fullName, setFullName] = useState('');
            const [email, setEmail] = useState('');
            const [userType, setUserType] = useState('');
            const [isLoading, setIsLoading] = useState(false);
            const [success, setSuccess] = useState(false);
            const [error, setError] = useState('');

            const validateEmail = (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);
            const isFormValid = fullName.trim().length > 0 && validateEmail(email) && userType.trim().length > 0;

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                if (!isFormValid) { setError('Please complete all fields correctly.'); return; }
                setIsLoading(true);
                try {
                    const formData = new FormData();
                    formData.append('form-name', 'waitlist');
                    formData.append('fullName', fullName);
                    formData.append('email', email);
                    formData.append('userType', userType);
                    const response = await fetch('/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams(formData).toString()
                    });
                    if (response.ok) { setSuccess(true); setFullName(''); setEmail(''); setUserType(''); }
                    else { throw new Error('Failed to submit'); }
                } catch (err) { setError('Something went wrong. Please try again.'); }
                finally { setIsLoading(false); }
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-nomad-black/60 backdrop-blur-xl" onClick={(e) => e.target === e.currentTarget && onClose()}>
                    <div className="bg-white p-12 rounded-3xl shadow-2xl w-full max-w-md relative border border-nomad-pink/10">
                        <button onClick={onClose} className="absolute top-6 right-6 text-nomad-black/40 hover:text-nomad-pink transition-colors"><X size={24} /></button>
                        {success ? (
                            <div className="text-center py-8">
                                <div className="w-16 h-16 bg-nomad-pink/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                    <svg className="w-8 h-8 text-nomad-pink" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" /></svg>
                                </div>
                                <h3 className="text-3xl font-black mb-3 text-nomad-black">Success</h3>
                                <p className="text-nomad-black/60 mb-6 font-light">We'll be in touch soon.</p>
                                <button onClick={onClose} className="px-8 py-3 bg-nomad-pink text-white rounded-full font-bold hover:bg-nomad-magenta transition-colors">Done</button>
                            </div>
                        ) : (
                            <>
                                <h3 className="text-3xl font-black mb-2 text-nomad-black font-display">Get Early Access</h3>
                                <p className="text-nomad-black/50 mb-8 text-sm uppercase tracking-widest font-bold">Join the Nomad revolution.</p>
                                <form onSubmit={handleSubmit} noValidate>
                                    <input type="text" placeholder="Full name" value={fullName} onChange={(e) => setFullName(e.target.value)} className="w-full px-5 py-4 rounded-xl border border-nomad-pink/20 bg-nomad-pink/5 mb-4 focus:outline-none focus:border-nomad-pink text-nomad-black placeholder:text-nomad-black/40" />
                                    <input type="email" placeholder="Email address" value={email} onChange={(e) => setEmail(e.target.value)} className="w-full px-5 py-4 rounded-xl border border-nomad-pink/20 bg-nomad-pink/5 mb-4 focus:outline-none focus:border-nomad-pink text-nomad-black placeholder:text-nomad-black/40" />
                                    <select value={userType} onChange={(e) => setUserType(e.target.value)} className="w-full px-5 py-4 rounded-xl border border-nomad-pink/20 bg-nomad-pink/5 mb-6 focus:outline-none focus:border-nomad-pink text-nomad-black appearance-none cursor-pointer">
                                        <option value="" disabled>Select category</option>
                                        <option value="patient">Patient</option>
                                        <option value="investor">Potential Investor</option>
                                        <option value="government">Government / NGO</option>
                                    </select>
                                    <button type="submit" disabled={isLoading} className="w-full py-4 bg-nomad-black text-white rounded-xl font-bold uppercase tracking-widest hover:bg-nomad-pink transition-colors disabled:opacity-70">{isLoading ? 'Processing...' : 'Secure Access'}</button>
                                </form>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const Content = () => (
            <div className="pt-48 pb-24 px-6 md:px-16 lg:px-24 max-w-4xl mx-auto">
                <div className="animate-fade-in">
                    <p className="text-xs font-bold text-[#FF1B8D] uppercase tracking-[0.3em] mb-6">Legal Framework</p>
                    <h1 className="text-5xl md:text-7xl font-light tracking-tight mb-16 font-display">Privacy Policy</h1>
                    
                    <div className="space-y-12 text-[#0A0A0A]/70 leading-relaxed text-lg font-light">
                        <section>
                            <h2 className="text-xl font-bold text-[#0A0A0A] mb-4 uppercase tracking-widest">1. Overview</h2>
                            <p>Nomad Neuroscience Ltd ("we", "our", or "us") is committed to protecting and respecting your privacy. This policy explains how we collect, use, and safeguard your personal data when you visit our website and use our services, in accordance with the UK General Data Protection Regulation (UK GDPR) and the Data Protection Act 2018.</p>
                        </section>

                        <section>
                            <h2 className="text-xl font-bold text-[#0A0A0A] mb-4 uppercase tracking-widest">2. Data We Collect</h2>
                            <p>We may collect and process the following data about you:</p>
                            <ul className="list-disc pl-6 mt-4 space-y-2">
                                <li><strong>Identity Data:</strong> Name and contact details when you join our waitlist or create an account.</li>
                                <li><strong>Technical Data:</strong> IP address, browser type, time zone setting, and operating system when you visit our site.</li>
                                <li><strong>Usage Data:</strong> Information about how you use our website and services.</li>
                            </ul>
                        </section>

                        <section>
                            <h2 className="text-xl font-bold text-[#0A0A0A] mb-4 uppercase tracking-widest">3. How We Use Your Data</h2>
                            <p>We use your information to provide and manage our services, communicate updates, improve our user experience, and comply with legal obligations.</p>
                        </section>

                        <section>
                            <h2 className="text-xl font-bold text-[#0A0A0A] mb-4 uppercase tracking-widest">4. Regulatory Status</h2>
                            <p>Nomad is currently an <strong>investigational device</strong>, intended exclusively for clinical investigation purposes. It has not yet been reviewed, cleared, or approved by the Medicines and Healthcare products Regulatory Agency (MHRA) or any other regulatory body. The device is not currently available for commercial medical use or sale to the general public.</p>
                        </section>

                        <section>
                            <h2 className="text-xl font-bold text-[#0A0A0A] mb-4 uppercase tracking-widest">5. Your Rights</h2>
                            <p>Under UK data protection law, you have the right of access, rectification, erasure, and restriction of processing regarding your personal information.</p>
                        </section>

                        <section>
                            <h2 className="text-xl font-bold text-[#0A0A0A] mb-4 uppercase tracking-widest">6. Contact Us</h2>
                            <p>If you have any questions about this privacy policy, please contact us at:</p>
                            <div className="mt-4 font-bold uppercase tracking-widest text-[#0A0A0A] space-y-1">
                                <p>NOMAD NEUROSCIENCE LTD</p>
                                <p className="text-sm font-light lowercase tracking-normal">Company № 16558472</p>
                            </div>
                            <p className="mt-4">
                                Registered Office:<br />
                                71-75 Shelton Street, Covent Garden<br />
                                London, United Kingdom, WC2H 9JQ
                            </p>
                            <p className="mt-4">
                                Email: <a href="mailto:hello@nomadneuro.com" className="text-nomad-pink hover:underline">hello@nomadneuro.com</a>
                            </p>
                        </section>
                    </div>
                </div>
            </div>
        );

        const Footer = () => (
            <footer data-theme="dark" className="bg-nomad-black text-white/40 py-24 px-6 md:px-16 lg:px-24 font-tech">
                <div className="max-w-[1400px] mx-auto">
                    <div className="flex flex-col md:flex-row justify-between items-start gap-12 mb-16">
                        <span className="font-display text-lg tracking-[0.2em] font-medium lowercase text-white">nomad</span>
                        <div className="flex flex-wrap gap-8 text-[10px] uppercase tracking-[0.3em] font-medium">
                            <a href="/" className="hover:text-white transition-colors">Home</a>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-12 pt-12 border-t border-white/5">
                        <div className="space-y-4">
                            <h4 className="font-bold text-[10px] uppercase tracking-[0.2em] text-white/20">Regulatory Status</h4>
                            <p className="text-[10px] leading-relaxed uppercase tracking-widest text-white/30">
                                Nomad is an investigational device, exclusively for clinical investigation. It has not yet been reviewed or approved by the MHRA or other regulatory authorities and is not available for commercial sale or medical use.
                            </p>
                        </div>
                        <div className="space-y-4">
                            <h4 className="font-bold text-[10px] uppercase tracking-[0.2em] text-white/20">Corporate</h4>
                            <div className="flex flex-col gap-2 text-[10px] uppercase tracking-widest">
                                <span>&copy; 2026 Nomad Neuroscience Ltd. All rights reserved.</span>
                                <span>Registered in England and Wales • Company № 16558472</span>
                                <span>Note: This policy applies to all our investigational activities.</span>
                            </div>
                        </div>
                    </div>
                </div>
            </footer>
        );

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [waitlistOpen, setWaitlistOpen] = useState(false);

            return (
                <>
                    {loading && <LoadingScreen onComplete={() => setLoading(false)} />}
                    <div className={`transition-opacity duration-1000 ${loading ? 'opacity-0' : 'opacity-100'}`}>
                        <Navbar onWaitlistClick={() => setWaitlistOpen(true)} />
                        <Content />
                        <Footer />
                        <WaitlistModal isOpen={waitlistOpen} onClose={() => setWaitlistOpen(false)} />
                    </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
    </style>
</body>
</html>

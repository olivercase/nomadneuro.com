    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Italic text uses serif font for elegant contrast */
        .italic,
        i,
        em {
            font-family: 'Newsreader', Georgia, serif;
            font-style: italic;
        }

        ::selection {
            background: #FF1B8D;
            color: #FFFFFF;
        }

        /* Nomad gradient text - like Superpower */
        .nomad-gradient {
            background: linear-gradient(135deg, #FF1B8D 0%, #FF6B6B 25%, #FFB4A2 50%, #FF6B6B 75%, #FF1B8D 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 8s ease infinite;
        }

        @keyframes gradientFlow {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Static gradient for logo */
        .nomad-gradient-static {
            background: linear-gradient(135deg, #FF1B8D 0%, #FF6B6B 50%, #FFB4A2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Display heading */
        .display-heading {
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 0.9;
            letter-spacing: -0.03em;
            font-weight: 300;
        }

        /* Hero display - extra large */
        .display-hero {
            font-size: clamp(3.5rem, 12vw, 9rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
            font-weight: 200;
        }

        /* Stats counter animation */
        .stat-number {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        /* Pink glow effect */
        .pink-glow {
            box-shadow: 0 0 60px rgba(255, 27, 141, 0.3);
        }

        .pink-glow-sm {
            box-shadow: 0 0 30px rgba(255, 27, 141, 0.2);
        }

        /* Card hover lift effect */
        .card-lift {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
        }

        .card-lift:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px -15px rgba(255, 27, 141, 0.2);
        }

        /* Scroll indicator */
        .scroll-indicator {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        /* Checklist checkmark - pink */
        .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF1B8D 0%, #FF6B6B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Mono/label text style */
        .text-mono {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* Pink pill badge */
        .pill-pink {
            background: linear-gradient(135deg, rgba(255, 27, 141, 0.1) 0%, rgba(255, 107, 107, 0.1) 100%);
            border: 1px solid rgba(255, 27, 141, 0.2);
            color: #FF1B8D;
        }

        /* Animated border gradient */
        .gradient-border {
            position: relative;
            background: white;
            border-radius: 24px;
        }

        .gradient-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, #FF1B8D, #FF6B6B, #FFB4A2, #FF6B6B, #FF1B8D);
            background-size: 300% 300%;
            border-radius: 26px;
            z-index: -1;
            animation: gradientFlow 4s ease infinite;
        }

        /* Marquee animation */
        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            animation: marquee 15s linear infinite;
        }

        /* Fade mask for marquee */
        .fade-mask {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }

        /* Lenis base styles */
        html.lenis, html.lenis body {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto !important;
        }
        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
        .lenis.lenis-stopped {
            overflow: hidden;
        }
        .lenis.lenis-smooth iframe {
            pointer-events: none;
        }

        /* Text Reveal */
        .word-mask {
            overflow: hidden;
            display: inline-block;
            vertical-align: top;
            padding-bottom: 0.1em; /* Prevent descender clipping entirely */
            margin-right: 0.25em; /* approximate word spacing */
        }
        .word-inner {
            display: inline-block;
            transform: translateY(110%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }
        .word-inner.revealed {
            transform: translateY(0);
        }

        /* Curved Reveal */
        .curved-mask {
            clip-path: ellipse(110% 110% at 50% 100%);
            transition: clip-path 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: clip-path;
        }
        .curved-mask.revealed {
            clip-path: ellipse(150% 150% at 50% 50%);
        }
    </style>
</head>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- ICONS --- */
        const IconWrapper = ({ children, size = 24, color = "currentColor", className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Menu = (props) => <IconWrapper {...props}><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></IconWrapper>;
        const Activity = (props) => <IconWrapper {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></IconWrapper>;
        const Brain = (props) => <IconWrapper {...props}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" /><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" /></IconWrapper>;
        const HeartPulse = (props) => <IconWrapper {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27" /></IconWrapper>;
        const ShieldCheck = (props) => <IconWrapper {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="m9 12 2 2 4-4" /></IconWrapper>;
        const Lock = (props) => <IconWrapper {...props}><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></IconWrapper>;

        /* --- UTILITIES --- */
        const useScrollPosition = () => {
            const [scrollPosition, setScrollPosition] = useState(0);
            useEffect(() => {
                const updatePosition = () => setScrollPosition(window.scrollY);
                window.addEventListener('scroll', updatePosition);
                return () => window.removeEventListener('scroll', updatePosition);
            }, []);
            return scrollPosition;
        };

        const Button = ({ children, variant = 'primary', className = '', onClick, href, size = 'default' }) => {
            const baseStyle = "relative rounded-full font-medium tracking-wide transition-all duration-300 overflow-hidden group active:scale-[0.98]";
            const sizes = {
                small: "px-6 py-2.5 text-xs",
                default: "px-8 py-3.5 text-sm",
                large: "px-10 py-4 text-base"
            };
            const variants = {
                primary: "bg-nomad-pink text-white hover:bg-nomad-magenta shadow-lg hover:shadow-xl hover:shadow-nomad-pink/25 pink-glow-sm",
                secondary: "bg-white text-nomad-black border border-black/10 hover:border-nomad-pink hover:text-nomad-pink",
                dark: "bg-nomad-black text-white hover:bg-nomad-dark",
                outline: "bg-transparent text-white border-2 border-white hover:bg-white hover:text-nomad-black",
                ghost: "bg-transparent text-nomad-black hover:bg-black/5"
            };

            if (href) {
                return (
                    <a href={href} className={`${baseStyle} ${sizes[size]} ${variants[variant]} ${className} inline-flex items-center justify-center gap-2`}>
                        {children}
                    </a>
                );
            }

            return (
                <button onClick={onClick} className={`${baseStyle} ${sizes[size]} ${variants[variant]} ${className} inline-flex items-center justify-center gap-2`}>
                    {children}
                </button>
            );
        };

        const FadeIn = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) setIsVisible(true);
                    },
                    { threshold: 0.1, rootMargin: "50px" }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return (
                <div
                    ref={ref}
                    className={`transition-all duration-[1200ms] ease-out transform ${isVisible ? 'opacity-100 translate-y-0 blur-none' : 'opacity-0 translate-y-8 blur-[8px]'
                        }`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        const useParallax = (speed = 0.5) => {
            const ref = useRef(null);
            
            useEffect(() => {
                const handleScroll = () => {
                    if (ref.current) {
                        const scrolled = window.scrollY;
                        ref.current.style.transform = `translate3d(0, ${scrolled * speed}px, 0)`;
                    }
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, [speed]);
            
            return ref;
        };

        const TextReveal = ({ children, className = "", delay = 0 }) => {
            const containerRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.disconnect();
                        }
                    },
                    { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
                );

                if (containerRef.current) observer.observe(containerRef.current);
                return () => observer.disconnect();
            }, []);

            const words = typeof children === 'string' ? children.split(/(?=\S)/).reduce((acc, current) => {
               // Ensure spaces are properly preserved by splitting on whitespace but keeping words intact
               const last = acc[acc.length - 1];
               if (last && last.endsWith(' ') && !current.startsWith(' ')) {
                   acc[acc.length - 1] = last + current;
               } else {
                   // actually just split by space is easiest, and we re-add margin
                   // The CSS has margin-right: 0.25em
               }
               return acc;
            }, []) : [];
            
            // Simpler split by space
            const wordsList = typeof children === 'string' ? children.split(' ') : [];

            return (
                <span ref={containerRef} className={className}>
                    {typeof children === 'string' ? wordsList.map((word, i) => (
                        <span key={i} className="word-mask">
                            <span 
                                className={`word-inner ${isVisible ? 'revealed' : ''}`}
                                style={{ 
                                    transitionDelay: `${delay + i * 40}ms`
                                }}
                            >
                                {word}
                            </span>
                        </span>
                    )) : (
                        <span className="word-mask inline-block w-full">
                            <span className={`word-inner w-full ${isVisible ? 'revealed' : ''}`} style={{ transitionDelay: `${delay}ms`}}>
                                {children}
                            </span>
                        </span>

            );

            const ref = useRef(null);
            const [position, setPosition] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const element = ref.current;
                if (!element || window.matchMedia("(pointer: coarse)").matches) return;

                const handleMouseMove = (e) => {
                    const { clientX, clientY } = e;
                    const { left, top, width, height } = element.getBoundingClientRect();
                    const x = (clientX - (left + width / 2)) * 0.3;
                    const y = (clientY - (top + height / 2)) * 0.3;
                    setPosition({ x, y });
                };

                const handleMouseLeave = () => {
                    setPosition({ x: 0, y: 0 });
                };

                element.addEventListener("mousemove", handleMouseMove);
                element.addEventListener("mouseleave", handleMouseLeave);

                return () => {
                    element.removeEventListener("mousemove", handleMouseMove);
                    element.removeEventListener("mouseleave", handleMouseLeave);
                };
            }, []);

            return (
                <div 
                    ref={ref} 
                    className={`inline-block transition-transform duration-300 ease-out will-change-transform ${className}`}

                return () => observer.disconnect();

                        if (entry.isIntersecting) {
                            let start = 0;
                            const increment = end / (duration / 16);
                            timer = setInterval(() => {
                                start += increment;
                                if (start >= end) {
                                    setCount(end);
                                    clearInterval(timer);
                                } else {
                                    setCount(Math.floor(start));
                                }
                            }, 16);
                        } else {
                            clearInterval(timer);
                            setCount(0); // Reset when scrolled out of view
                        }
                    },
                    { threshold: 0.5 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => {
                    clearInterval(timer);

        /* --- CTA SECTION --- */
        const CTASection = ({ onWaitlistClick }) => {
            return (
                <section className="relative py-32 md:py-48 px-6 md:px-16 lg:px-24 overflow-hidden bg-nomad-pink">
                    <div className="max-w-[1400px] mx-auto relative z-10">
                        <FadeIn>

                                </h2>
                                <p className="text-xl md:text-2xl text-white/80 mb-10 leading-relaxed max-w-xl">
                                    Join the waitlist and be among the first to experience the future of autonomic health.
                                </p>
                                <Magnetic>
                                    <button
                                        onClick={onWaitlistClick}

        };

        const Footer = () => {
            const [footerEmail, setFooterEmail] = useState('');
            const [footerSubmitting, setFooterSubmitting] = useState(false);
            const [footerSuccess, setFooterSuccess] = useState(false);

            const handleFooterSubmit = async (e) => {
                e.preventDefault();
                setFooterSubmitting(true);

                try {
                    const formData = new FormData();
                    formData.append('form-name', 'waitlist');
                    formData.append('email', footerEmail);

                    const response = await fetch('/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: new URLSearchParams(formData).toString()
                    });

                    if (response.ok) {
                        setFooterSuccess(true);
                        setFooterEmail('');
                        setTimeout(() => setFooterSuccess(false), 3000);
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    setFooterSubmitting(false);
                }
            };

            return (
                <footer className="bg-nomad-black text-white py-24 px-6 md:px-16 lg:px-24">
                    <div className="max-w-[1400px] mx-auto">
                        {/* Top Section */}
                        <div className="grid grid-cols-2 md:grid-cols-6 gap-10 md:gap-8 mb-20 pb-20 border-b border-white/10">
                            <div className="col-span-2">
                                <div className="font-display text-2xl font-medium lowercase tracking-wide mb-6">nomad</div>
                                <p className="text-white/50 leading-relaxed max-w-xs mb-6 text-xl pb-2">
                                    The operating system for your body.
                                </p>
                                <p className="text-white/30 text-xs uppercase tracking-widest leading-relaxed max-w-xs border-t border-white/10 pt-4">
                                    * NOMAD nodes closed loop neuromodulation in the electrical field and the acoustic (ultrasound) field all non-invasive.
                                </p>
                            </div>

                            <div>
                                <h4 className="font-bold mb-6 text-xs uppercase tracking-[0.15em] text-white/30">1.0 Pages</h4>
                                <ul className="space-y-3 text-white/60 text-sm">
                                    <li><a href="#platform" className="hover:text-white transition-colors">E-field</a></li>
                                    <li><a href="#applications" className="hover:text-white transition-colors">A-field</a></li>
                                    <li><a href="#" className="hover:text-white transition-colors">Programs</a></li>
                                    <li><a href="#" className="hover:text-white transition-colors">Updates</a></li>
                                </ul>
                            </div>

                            <div>
                                <h4 className="font-bold mb-6 text-xs uppercase tracking-[0.15em] text-white/30">2.0 Follow</h4>
                                <ul className="space-y-3 text-white/60 text-sm">
                                    <li><a href="https://www.linkedin.com/company/nomadneuro/" className="hover:text-white transition-colors" target="_blank" rel="noopener noreferrer">LinkedIn</a></li>
                                </ul>
                            </div>

                            <div className="col-span-2">
                                <h4 className="font-bold mb-6 text-xs uppercase tracking-[0.15em] text-white/30">Newsletter</h4>
                                <form onSubmit={handleFooterSubmit} className="space-y-3 max-w-xs">
                                    <input
                                        type="email"
                                        placeholder="Email address"
                                        value={footerEmail}
                                        onChange={(e) => setFooterEmail(e.target.value)}
                                        required
                                        className="w-full bg-white/5 border border-white/10 rounded-lg px-4 py-3 text-sm focus:outline-none focus:border-nomad-pink transition-colors text-white placeholder:text-white/30"
                                    />
                                    <button
                                        type="submit"
                                        disabled={footerSubmitting}
                                        className="w-full bg-nomad-pink text-white rounded-lg px-4 py-3 text-sm font-medium hover:bg-nomad-magenta transition-colors disabled:opacity-70"
                                    >
                                        {footerSuccess ? 'Subscribed!' : footerSubmitting ? 'Subscribing...' : 'Subscribe'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* Bottom Section */}
                        <div className="flex flex-col md:flex-row justify-between items-start gap-8 text-[10px] text-white/50 uppercase tracking-widest pt-10 border-t border-white/5">
                            <div className="flex flex-col gap-2">
                                <span className="text-xs">© 2026 NOMAD NEUROSCIENCE LTD. All rights reserved.</span>
                                <div className="opacity-70 flex flex-col gap-1">
                                    <span>Registered in England and Wales • Company № 16558472</span>
                                    <span>Registered Office: 71-75 Shelton Street, Covent Garden, London, WC2H 9JQ</span>
                                </div>
                                <div className="mt-4 pt-4 border-t border-white/5 opacity-60 text-[9px] leading-relaxed max-w-2xl">
                                    <span className="font-bold text-white/80 mb-1 block uppercase tracking-widest">Regulatory Status</span>
                                    <p>Nomad is an investigational device, exclusively for clinical investigation. It has not yet been reviewed or approved by the MHRA or other regulatory authorities and is not available for commercial sale or medical use.</p>
                                </div>
                            </div>
                            <div className="flex gap-8">
                                <a href="privacy.html" className="hover:text-white transition-colors">Privacy Policy</a>
                            </div>
                        </div>
                    </div>
                </footer>
            );
        };

        /* --- NEW MODULAR SECTIONS --- */
        const NumberedSection = ({ number, title, description, badge, linkText }) => (
            <div className="border-t border-nomad-black/10 py-16 flex flex-col md:flex-row justify-between items-start gap-12 group">
                <div className="flex gap-8 lg:w-1/2">
                    <span className="text-nomad-black text-2xl md:text-3xl font-light transition-transform duration-300 group-hover:translate-x-2">{number}</span>
                    <div>
                        <h3 className="text-3xl md:text-5xl font-light text-nomad-black leading-tight mb-6 tracking-tight">{title}</h3>
                        <p className="text-xl text-nomad-black/60 leading-relaxed max-w-sm">{description}</p>
                    </div>
                </div>
                <div className="flex flex-col items-start md:items-end justify-between h-full lg:w-1/2 gap-12">
                   <div className="px-5 py-2 rounded-full border border-black/10 text-xs tracking-widest uppercase font-medium">{badge}</div>
                   {linkText && (
                       <button className="flex items-center gap-3 text-nomad-pink hover:text-black transition-colors font-medium">
                            {linkText}
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" className="group-hover:translate-x-1 transition-transform">
                                <path d="M9 18L15 12L9 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                            </svg>
                       </button>
                   )}
                </div>
            </div>
        );

        const ScienceAndTeam = () => {
            const team = [
                { name: "Santiago Denari", role: "Chief Executive Officer", bio: "", image: "Santi.jpg" },
                { name: "Oliver Case", role: "Chief Science Officer", bio: "", image: "Ollie.png" },
                { name: "Ben Black", role: "Management Team [NED]", bio: "", image: "ben_black.png" },
                { name: "Ben Newton", role: "Management Team", bio: "", image: "Ben_newton.png" },
                { name: "Callum Shingleton Smith", role: "Head of Engineering", bio: "", image: "callum.png" },
                { name: "Marcelo Arenas", role: "Head of Systems", bio: "", image: "Marcelo.png" },
                { name: "Dr. Guy Winter", role: "Management Team", bio: "", image: "Guy_winter.png" },
                { name: "Dr. Ali Hawks", role: "Management Team", bio: "", image: "Ali-050.png" },
                { name: "Patrik Nilsson", role: "Supply Chain Resilience", bio: "", image: "Patrik_Nilsson.png" },
                { name: "Prof. Imanuel Lerman", role: "Clinical Team", bio: "", image: "Imanuel_Lerman.png" },
                { name: "Prof. Steve Alty", role: "Engineering Advisor", bio: "", image: "Steve_Alty.png" },
                { name: "Anders Borg", role: "Strategic Advisor", bio: "", image: "Anders_borg.png" },
                { name: "Manuel Hidalgo Sola", role: "App Dev Team", bio: "", image: "Manuel.png" }
            ];

            return (
                <section className="bg-nomad-cream py-32 md:py-48 px-6 md:px-16 lg:px-24">
                    <div className="max-w-[1400px] mx-auto">
                        <NumberedSection
                            number="1.0"
                            title="Scientific Evidence"
                            description="Wearables and insights, science-driven."
                            badge="Learn How"
                            linkText="Explore E-field"
                        />
                        <div className="mt-24" id="team">
                            <NumberedSection
                                number="2.0"
                                title="Driven by People"
                                description="We believe technology is only as powerful as the people behind it. Discover the team that makes it possible."
                                badge="Power Unified"
                                linkText=""
                            />
                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 mt-16 border-t border-l border-nomad-black/10">
                                {team.map((member, idx) => (
                                    <div key={idx} className="border-r border-b border-nomad-black/10">
                                        <PhotoGridItem {...member} />
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const GetInTouch = () => (
             <section className="bg-nomad-cream py-32 md:py-48 px-6 md:px-16 lg:px-24">
                <div className="max-w-[1400px] mx-auto">
                     <NumberedSection
                        number="3.0"
                        title="Get in Touch"
                        description="Questions, ideas, or just a hello — we're here. Reach out and let's build something remarkable together."
                        badge="Say Hello"
                        linkText="Contact Us"
                    />
                </div>
            </section>
        );

        /* --- LOADING SCREEN --- */
        const LoadingScreen = ({ onComplete }) => {
            const [phase, setPhase] = useState(0); // 0: 'n' only, 1: reveal 'omad', 2: split transition

            useEffect(() => {
                document.body.style.overflow = 'hidden';

                const revealTimer = setTimeout(() => {
                    setPhase(1);
                }, 800);

                const splitTimer = setTimeout(() => {
                    setPhase(2);
                }, 2000);

                const completeTimer = setTimeout(() => {
                    document.body.style.overflow = 'auto';
                    onComplete();
                }, 2800);

                return () => {
                    clearTimeout(revealTimer);
                    clearTimeout(splitTimer);
                    clearTimeout(completeTimer);
                    document.body.style.overflow = 'auto';
                };
            }, [onComplete]);

            return (
                <div className="fixed inset-0 z-[150] pointer-events-none flex flex-col">
                    {/* Top sliding panel */}
                    <div 
                        className={`absolute top-0 left-0 w-full h-[50vh] bg-nomad-pink transition-transform duration-[800ms] ease-[cubic-bezier(0.76,0,0.24,1)] border-b border-white/5 ${phase === 2 ? '-translate-y-full' : 'translate-y-0'}`} 
                    />
                    
                    {/* Bottom sliding panel */}
                    <div 
                        className={`absolute bottom-0 left-0 w-full h-[50vh] bg-nomad-pink transition-transform duration-[800ms] ease-[cubic-bezier(0.76,0,0.24,1)] border-t border-white/5 ${phase === 2 ? 'translate-y-full' : 'translate-y-0'}`} 
                    />

                    {/* Central Wordmark Animation */}
                    <div 
                        className={`absolute inset-0 flex items-center justify-center transition-opacity duration-500 ${phase === 2 ? 'opacity-0' : 'opacity-100'}`}
                    >
                        <div className="flex items-center text-4xl md:text-5xl lg:text-7xl font-light text-white tracking-tight font-display lowercase overflow-hidden">
                            <span>n</span>
                            <div 
                                className={`transition-all duration-[1000ms] ease-[cubic-bezier(0.22,1,0.36,1)] overflow-hidden flex ${phase >= 1 ? 'max-w-[300px] opacity-100' : 'max-w-0 opacity-0'}`}
                            >
                                <span>omad</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);
            const [loginOpen, setLoginOpen] = useState(false);
            const [waitlistOpen, setWaitlistOpen] = useState(false);

            useEffect(() => {
                if (window.Lenis) {
                    const lenis = new window.Lenis({
                        duration: 1.2,
                        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                        direction: 'vertical',
                        gestureDirection: 'vertical',
                        smooth: true,
                        mouseMultiplier: 1,
                        smoothTouch: false,
                        touchMultiplier: 2,
                        infinite: false,
                    });

                    function raf(time) {
                        lenis.raf(time);
                        requestAnimationFrame(raf);
                    }

                    requestAnimationFrame(raf);
                    
                    return () => {
                        lenis.destroy();
                    }
                }
            }, []);

            return (
                <>
                    {loading && <LoadingScreen onComplete={() => setLoading(false)} />}
                    <div className={`font-sans text-nomad-black bg-nomad-cream antialiased selection:bg-nomad-pink selection:text-white transition-opacity duration-1000 ${loading ? 'opacity-0' : 'opacity-100'}`}>
                        <Navbar onLoginClick={() => setLoginOpen(true)} onWaitlistClick={() => setWaitlistOpen(true)} />
                    <Hero onLoginClick={() => setLoginOpen(true)} onWaitlistClick={() => setWaitlistOpen(true)} />
                    <MarqueeText text="THE OPERATING SYSTEM FOR YOUR BODY • CLOSED-LOOP NEUROMODULATION • NON-INVASIVE • REAL TIME • PERSONALIZED TO YOU • " />
                    <OverviewBlock />
                    <MissionGrid />
                    <FutureWearable />
                    <Stats />
                    <ScienceAndTeam />
                    <Roadmap />
                    <PartnerLogos />
                    <GetInTouch />
                    <Footer />
                    <LoginModal isOpen={loginOpen} onClose={() => setLoginOpen(false)} />
                    <WaitlistModal isOpen={waitlistOpen} onClose={() => setWaitlistOpen(false)} />
                </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

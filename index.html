    <!-- Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nomad: {
                            black: '#0A0A0A',
                            dark: '#1C1B1A',
                            base: '#FAFAFA',
                            cream: '#F5F5F0',
                            white: '#FFFFFF',
                            pink: '#FF1B8D',
                            magenta: '#E91E8C',
                            coral: '#FF6B6B',
                            peach: '#FFB4A2',
                            accent: '#7D7671'
                        }
                    },
                    fontFamily: {
                        sans: ['PP Neue Montreal', 'IBM Plex Sans', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                        serif: ['Newsreader', 'Georgia', 'serif'],
                        display: ['PP Neue Montreal', 'IBM Plex Sans', 'sans-serif'],
                        tech: ['IBM Plex Sans', 'ui-monospace', 'monospace'],
                    },
                    animation: {
                        'slow-zoom': 'slowZoom 20s infinite alternate ease-in-out',
                        'fade-in-up': 'fadeInUp 1s ease-out forwards',
                        'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
                        'pulse-soft': 'pulseSoft 2s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'gradient-shift': 'gradientShift 8s ease infinite',
                    },
                    keyframes: {
                        slowZoom: {
                            '0%': { transform: 'scale(1.05)' },
                            '100%': { transform: 'scale(1.15)' },
                        },
                        fadeInUp: {
                            '0%': { opacity: '0', transform: 'translateY(20px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '20%, 60%': { transform: 'translateX(-5px)' },
                            '40%, 80%': { transform: 'translateX(5px)' },
                        },
                        pulseSoft: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.5' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        gradientShift: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Italic text uses serif font for elegant contrast */
        .italic,
        i,
        em {
            font-family: 'Newsreader', Georgia, serif;
            font-style: italic;
        }

        ::selection {
            background: #FF1B8D;
            color: #FFFFFF;
        }

        /* Nomad gradient text - like Superpower */
        .nomad-gradient {
            background: linear-gradient(135deg, #FF1B8D 0%, #FF6B6B 25%, #FFB4A2 50%, #FF6B6B 75%, #FF1B8D 100%);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientFlow 8s ease infinite;
        }

        @keyframes gradientFlow {

            0%,
            100% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }
        }

        /* Static gradient for logo */
        .nomad-gradient-static {
            background: linear-gradient(135deg, #FF1B8D 0%, #FF6B6B 50%, #FFB4A2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Display heading */
        .display-heading {
            font-size: clamp(3rem, 10vw, 7rem);
            line-height: 0.9;
            letter-spacing: -0.03em;
            font-weight: 300;
        }

        /* Hero display - extra large */
        .display-hero {
            font-size: clamp(3.5rem, 12vw, 9rem);
            line-height: 0.85;
            letter-spacing: -0.04em;
            font-weight: 200;
        }

        /* Stats counter animation */
        .stat-number {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 300;
            line-height: 1;
            letter-spacing: -0.03em;
        }

        /* Pink glow effect */
        .pink-glow {
            box-shadow: 0 0 60px rgba(255, 27, 141, 0.3);
        }

        .pink-glow-sm {
            box-shadow: 0 0 30px rgba(255, 27, 141, 0.2);
        }

        /* Card hover lift effect */
        .card-lift {
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
        }

        .card-lift:hover {
            transform: translateY(-12px);
            box-shadow: 0 30px 60px -15px rgba(255, 27, 141, 0.2);
        }

        /* Scroll indicator */
        .scroll-indicator {
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        /* Checklist checkmark - pink */
        .check-icon {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FF1B8D 0%, #FF6B6B 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        /* Mono/label text style */
        .text-mono {
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        /* Pink pill badge */
        .pill-pink {
            background: linear-gradient(135deg, rgba(255, 27, 141, 0.1) 0%, rgba(255, 107, 107, 0.1) 100%);
            border: 1px solid rgba(255, 27, 141, 0.2);
            color: #FF1B8D;
        }

        /* Animated border gradient */
        .gradient-border {
            position: relative;
            background: white;
            border-radius: 24px;
        }

        .gradient-border::before {
            content: '';
            position: absolute;
            inset: -2px;
            background: linear-gradient(135deg, #FF1B8D, #FF6B6B, #FFB4A2, #FF6B6B, #FF1B8D);
            background-size: 300% 300%;
            border-radius: 26px;
            z-index: -1;
            animation: gradientFlow 4s ease infinite;
        }

        /* Marquee animation */
        @keyframes marquee {
            0% {
                transform: translateX(0);
            }

            100% {
                transform: translateX(-50%);
            }
        }

        .animate-marquee {
            animation: marquee 7s linear infinite;
        }
        
        .animate-slow-marquee {
            animation: marquee 8.75s linear infinite;
        }

        /* Fade mask for marquee */
        .fade-mask {
            mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
        }

        /* Lenis base styles */
        html.lenis, html.lenis body {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto !important;
        }
        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
        .lenis.lenis-stopped {
            overflow: hidden;
        }
        .lenis.lenis-smooth iframe {
            pointer-events: none;
        }

        /* Text Reveal */
        .word-mask {
            overflow: hidden;
            display: inline-block;
            vertical-align: top;
            padding-bottom: 0.1em; /* Prevent descender clipping entirely */
            margin-right: 0.25em; /* approximate word spacing */
        }
        .word-inner {
            display: inline-block;
            transform: translateY(110%);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }
        .word-inner.revealed {
            transform: translateY(0);
        }

        /* Curved Reveal */
        .curved-mask {
            clip-path: ellipse(110% 110% at 50% 100%);
            transition: clip-path 1.5s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: clip-path;
        }
        .curved-mask.revealed {
            clip-path: ellipse(150% 150% at 50% 50%);
        }
    </style>
</head>

<body>
    <!-- Hidden form for Netlify to detect during build -->
    <form name="waitlist" method="POST" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
        <input type="hidden" name="form-name" value="waitlist" />
        <input type="text" name="bot-field" />
        <input type="text" name="fullName" />
        <input type="email" name="email" />
        <select name="userType">
            <option value="patient">Patient</option>
            <option value="investor">Potential Investor</option>
            <option value="government">Government</option>
        </select>
    </form>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- ICONS --- */
        const IconWrapper = ({ children, size = 24, color = "currentColor", className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );
        const Menu = (props) => <IconWrapper {...props}><line x1="4" x2="20" y1="12" y2="12" /><line x1="4" x2="20" y1="6" y2="6" /><line x1="4" x2="20" y1="18" y2="18" /></IconWrapper>;
        const X = (props) => <IconWrapper {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></IconWrapper>;
        const Activity = (props) => <IconWrapper {...props}><path d="M22 12h-4l-3 9L9 3l-3 9H2" /></IconWrapper>;
        const Brain = (props) => <IconWrapper {...props}><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z" /><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z" /></IconWrapper>;
        const HeartPulse = (props) => <IconWrapper {...props}><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z" /><path d="M3.22 12H9.5l.5-1 2 4.5 2-7 1.5 3.5h5.27" /></IconWrapper>;
        const ShieldCheck = (props) => <IconWrapper {...props}><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10" /><path d="m9 12 2 2 4-4" /></IconWrapper>;
        const Lock = (props) => <IconWrapper {...props}><rect width="18" height="11" x="3" y="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></IconWrapper>;

        /* --- UTILITIES --- */
        const useScrollPosition = () => {
            const [scrollPosition, setScrollPosition] = useState(0);
            useEffect(() => {
                const updatePosition = () => setScrollPosition(window.scrollY);
                window.addEventListener('scroll', updatePosition);
                return () => window.removeEventListener('scroll', updatePosition);
            }, []);
            return scrollPosition;
        };

        const Button = ({ children, variant = 'primary', className = '', onClick, href, size = 'default', hoverImage }) => {
            const [isHovered, setIsHovered] = useState(false);
            
            const baseStyle = "relative rounded-full font-medium tracking-wide transition-all duration-300 overflow-hidden active:scale-[0.98] bg-center bg-cover border border-transparent";
            const sizes = {
                small: "px-6 py-2.5 text-xs",
                default: "px-8 py-3.5 text-sm",
                large: "px-10 py-4 text-base"
            };

            // Mapping variants to default textures if no specific image is provided
            const defaultTextures = {
                primary: 'button_back.png',
                secondary: 'button_back_2.png',
                outline: 'button_back_2.png',
                dark: 'button_back_3.png',
                ghost: 'button_back_3.png'
            };

            const activeTexture = hoverImage || defaultTextures[variant];

            const variants = {
                primary: "bg-nomad-pink text-white shadow-lg hover:shadow-xl hover:shadow-nomad-pink/25 pink-glow-sm",
                secondary: "bg-white text-nomad-black border-black/10 hover:text-white",
                dark: "bg-nomad-black text-white hover:bg-nomad-dark",
                outline: "bg-transparent text-white border-white hover:text-white hover:border-transparent",
                ghost: "bg-transparent text-nomad-black hover:bg-black/5"
            };

            const styles = isHovered ? {
                backgroundImage: `url('${activeTexture}')`,
                borderColor: 'transparent',
                color: (variant === 'secondary' || variant === 'ghost') ? 'white' : undefined
            } : {};

            const commonProps = {
                className: `${baseStyle} ${sizes[size]} ${variants[variant]} ${className} inline-flex items-center justify-center gap-2`,
                style: styles,
                onMouseEnter: () => setIsHovered(true),
                onMouseLeave: () => setIsHovered(false),
                onClick
            };

            if (href) {
                return (
                    <a href={href} {...commonProps}>
                        {children}
                    </a>
                );
            }

            return (
                <button {...commonProps}>
                    {children}
                </button>
            );
        };

        const FadeIn = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) setIsVisible(true);
                    },
                    { threshold: 0.1, rootMargin: "50px" }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return (
                <div
                    ref={ref}
                    className={`transition-all duration-[1200ms] ease-out transform ${isVisible ? 'opacity-100 translate-y-0 blur-none' : 'opacity-0 translate-y-8 blur-[8px]'
                        }`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        const useParallax = (speed = 0.5) => {
            const ref = useRef(null);
            
            useEffect(() => {
                const handleScroll = () => {
                    if (ref.current) {
                        const scrolled = window.scrollY;
                        ref.current.style.transform = `translate3d(0, ${scrolled * speed}px, 0)`;
                    }
                };
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, [speed]);
            
            return ref;
        };

        const TextReveal = ({ children, className = "", delay = 0 }) => {
            const containerRef = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.disconnect();
                        }
                    },
                    { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
                );

                if (containerRef.current) observer.observe(containerRef.current);
                return () => observer.disconnect();
            }, []);

            const words = typeof children === 'string' ? children.split(/(?=\S)/).reduce((acc, current) => {
               // Ensure spaces are properly preserved by splitting on whitespace but keeping words intact
               const last = acc[acc.length - 1];
               if (last && last.endsWith(' ') && !current.startsWith(' ')) {
                   acc[acc.length - 1] = last + current;
               } else {
                   // actually just split by space is easiest, and we re-add margin
                   // The CSS has margin-right: 0.25em
               }
               return acc;
            }, []) : [];
            
            // Simpler split by space
            const wordsList = typeof children === 'string' ? children.split(' ') : [];

            return (
                <span ref={containerRef} className={className}>
                    {typeof children === 'string' ? wordsList.map((word, i) => (
                        <span key={i} className="word-mask">
                            <span 
                                className={`word-inner ${isVisible ? 'revealed' : ''}`}
                                style={{ 
                                    transitionDelay: `${delay + i * 40}ms`
                                }}
                            >
                                {word}
                            </span>
                        </span>
                    )) : (
                        <span className="word-mask inline-block w-full">
                            <span className={`word-inner w-full ${isVisible ? 'revealed' : ''}`} style={{ transitionDelay: `${delay}ms`}}>
                                {children}
                            </span>
                        </span>
                    )}
                </span>
            );
        };

        const Magnetic = ({ children, className = "" }) => {
            const ref = useRef(null);
            const [position, setPosition] = useState({ x: 0, y: 0 });

            useEffect(() => {
                const element = ref.current;
                if (!element || window.matchMedia("(pointer: coarse)").matches) return;

                const handleMouseMove = (e) => {
                    const { clientX, clientY } = e;
                    const { left, top, width, height } = element.getBoundingClientRect();
                    const x = (clientX - (left + width / 2)) * 0.3;
                    const y = (clientY - (top + height / 2)) * 0.3;
                    setPosition({ x, y });
                };

                const handleMouseLeave = () => {
                    setPosition({ x: 0, y: 0 });
                };

                element.addEventListener("mousemove", handleMouseMove);
                element.addEventListener("mouseleave", handleMouseLeave);

                return () => {
                    element.removeEventListener("mousemove", handleMouseMove);
                    element.removeEventListener("mouseleave", handleMouseLeave);
                };
            }, []);

            return (
                <div 
                    ref={ref} 
                    className={`inline-block transition-transform duration-300 ease-out will-change-transform ${className}`} 
                    style={{ transform: `translate3d(${position.x}px, ${position.y}px, 0)` }}
                >
                    {children}
                </div>
            );
        };

        const CurvedReveal = ({ children, className = "" }) => {
            const ref = useRef(null);
            const [isVisible, setIsVisible] = useState(false);

            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsVisible(true);
                            observer.disconnect();
                        }
                    },
                    { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
                );

                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div ref={ref} className={`curved-mask w-full h-full ${isVisible ? 'revealed' : ''} ${className}`}>
                    {children}
                </div>
            );
        };

        const MarqueeText = ({ text }) => {
            return (
                <div className="w-full overflow-hidden bg-nomad-cream py-10 border-t border-b border-nomad-black/5 fade-mask">
                    <div className="whitespace-nowrap flex w-[200%] animate-marquee">
                        <span className="text-[12vw] font-display font-light uppercase tracking-widest text-nomad-black/10 mx-8">{text}</span>
                        <span className="text-[12vw] font-display font-light uppercase tracking-widest text-nomad-black/10 mx-8">{text}</span>
                        <span className="text-[12vw] font-display font-light uppercase tracking-widest text-nomad-black/10 mx-8">{text}</span>
                        <span className="text-[12vw] font-display font-light uppercase tracking-widest text-nomad-black/10 mx-8">{text}</span>
                    </div>
                </div>
            );
        };

        const PartnerLogos = () => {
            const partners = [
                "University College London (UCL)",
                "Royal Holloway, University of London",
                "University of San Diego",
                "Queen Mary University of London"
            ];
            
            const PartnerTrack = ({ className = "" }) => (
                <div className={`flex items-center gap-10 md:gap-20 pr-10 md:pr-20 ${className}`}>
                    {partners.map((partner, i) => (
                        <div key={i} className="inline-flex items-center gap-10 md:gap-20">
                            <span className="text-xl md:text-2xl font-display font-medium tracking-tighter text-nomad-black/40 hover:text-nomad-black/80 transition-all duration-500 whitespace-nowrap cursor-default">
                                {partner}
                            </span>
                            <span className="text-nomad-pink/20 text-2xl md:text-4xl font-light">·</span>
                        </div>
                    ))}
                </div>
            );

            return (
                <div className="w-full overflow-hidden bg-nomad-cream py-32 border-t border-nomad-black/5">
                    <div className="max-w-[1400px] mx-auto px-6 md:px-16 lg:px-24 mb-16 text-center">

                let timer;
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            let start = 0;
                            const increment = end / (duration / 16);
                            timer = setInterval(() => {
                                start += increment;
                                if (start >= end) {
                                    setCount(end);
                                    clearInterval(timer);
                                } else {
                                    setCount(Math.floor(start));
                                }
                            }, 16);
                        } else {
                            clearInterval(timer);
                            setCount(0); // Reset when scrolled out of view
                        }
                    },
                    { threshold: 0.5 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => {
                    clearInterval(timer);
                    observer.disconnect();
                };
            }, [end, duration]);

            ];

            useEffect(() => {
                const handleScroll = () => {
                    if (!sectionRef.current) return;
                    const rect = sectionRef.current.getBoundingClientRect();
                    const windowHeight = window.innerHeight;
                    
                    const startPos = windowHeight * 0.7; // Start animating when it is 30% up the screen
                    const endPos = windowHeight * 0.3;   // Finish when the bottom hits this point
                    
                    if (rect.top <= startPos && rect.bottom >= endPos) {
                        const totalScrollableDistance = rect.height;
                        const scrolled = startPos - rect.top;
                        let progress = (scrolled / totalScrollableDistance) * 100;
                        setLineProgress(Math.max(0, Math.min(100, progress)));
                    } else if (rect.top > startPos) {
                        setLineProgress(0);
                    } else if (rect.bottom < endPos) {
                        setLineProgress(100);
                    }
                };

                window.addEventListener('scroll', handleScroll, { passive: true });
                handleScroll();

                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            setIsInView(true);
                        }
                    },
                    { threshold: 0.15 }
                );
                if (sectionRef.current) observer.observe(sectionRef.current);
                
                return () => {
                    window.removeEventListener('scroll', handleScroll);
                    observer.disconnect();
                };
            }, []);

            return (

        /* --- LOADING SCREEN --- */
        const LoadingScreen = ({ onComplete }) => {
            const [phase, setPhase] = useState(0); // 0: 'n' only, 1: reveal 'omad', 2: split transition

            useEffect(() => {
                document.body.style.overflow = 'hidden';

                const revealTimer = setTimeout(() => {
                    setPhase(1);
                }, 800);

                const splitTimer = setTimeout(() => {
                    setPhase(2);
                }, 2000);

                const completeTimer = setTimeout(() => {
                    document.body.style.overflow = 'auto';
                    onComplete();
                }, 2800);

                return () => {
                    clearTimeout(revealTimer);
                    clearTimeout(splitTimer);
                    clearTimeout(completeTimer);
                    document.body.style.overflow = 'auto';

            useEffect(() => {
                if (window.Lenis) {

                        duration: 1.2,
                        easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                        direction: 'vertical',
                        gestureDirection: 'vertical',
                        smooth: true,
                        mouseMultiplier: 1,
                        smoothTouch: false,
                        touchMultiplier: 2,
                        infinite: false,
                    });

                    function raf(time) {
                        lenis.raf(time);
                        requestAnimationFrame(raf);
                    }

                    requestAnimationFrame(raf);
                    
                    return () => {
                        lenis.destroy();

                }

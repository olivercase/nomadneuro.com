<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Access the Nomad Partner Portal. The operating system for your body.">
    <meta name="theme-color" content="#F5F3ED">
    <title>Nomad - Partner Portal Sign In</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Lenis Smooth Scroll -->
    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&display=swap"
        rel="stylesheet">

    <style>
        /* Unica77 LL Font Family - Local Files */
        @font-face {
            font-family: "Unica77 LL";
            src: url("fonts/Unica77 LL Cyrillic (RUS by damnxav)/Unica77LLCyr-Thin.otf") format("opentype");
            font-weight: 100;
            font-style: normal;
        }

        @font-face {
            font-family: "Unica77 LL";
            src: url("fonts/Unica77 LL Cyrillic (RUS by damnxav)/Unica77LLCyr-Light.otf") format("opentype");
            font-weight: 300;
            font-style: normal;
        }

        @font-face {
            font-family: "Unica77 LL";
            src: url("fonts/Unica77 LL Cyrillic (RUS by damnxav)/Unica77LLCyr-Regular.otf") format("opentype");
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: "Unica77 LL";
            src: url("fonts/Unica77 LL Cyrillic (RUS by damnxav)/Unica77LLCyr-Medium.otf") format("opentype");
            font-weight: 500;
            font-style: normal;
        }

        @font-face {
            font-family: "Unica77 LL";
            src: url("fonts/Unica77 LL Cyrillic (RUS by damnxav)/Unica77LLCyr-Bold.otf") format("opentype");
            font-weight: 700;
            font-style: normal;
        }

        /* Aktiv Grotesk Font Family */
        @font-face {
            font-family: 'Aktiv Grotesk';
            src: url('fonts/aktiv-grotesk/AktivGrotesk-Thin.otf') format('opentype');
            font-weight: 200;
            font-style: normal;
        }
        @font-face {
            font-family: 'Aktiv Grotesk';
            src: url('fonts/aktiv-grotesk/AktivGrotesk-Regular.otf') format('opentype');
            font-weight: 400;
            font-style: normal;
        }
    </style>

    <!-- Configuration -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nomad: {
                            black: '#0A0A0A',
                            dark: '#1C1B1A',
                            base: '#F4F4F1',
                            cream: '#F5F5F0',
                            white: '#FFFFFF',
                            pink: '#FF1B8D',
                            magenta: '#E91E8C',
                            coral: '#FF6B6B',
                            peach: '#FFB4A2',
                            accent: '#7D7671'
                        }
                    },
                    fontFamily: {
                        sans: ['Unica77 LL', 'Aktiv Grotesk', 'Helvetica Neue', 'Helvetica', 'Arial', 'sans-serif'],
                        serif: ['Newsreader', 'Georgia', 'serif'],
                        display: ['Unica77 LL', 'Aktiv Grotesk', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-color: #F5F5F0;
        }

        .italic, i, em {
            font-family: 'Newsreader', Georgia, serif;
            font-style: italic;
        }

        /* Lenis Smooth Scroll */
        html.lenis {
            height: auto;
        }
        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }
        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }
        .lenis.lenis-stopped {
            overflow: hidden;
        }
    </style>
</head>

<body class="bg-nomad-cream text-nomad-black selection:bg-nomad-pink selection:text-white">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- COMPONENTS FROM INDEX --- */
        const FadeIn = ({ children, delay = 0 }) => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) setIsVisible(true);
                    },
                    { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return (
                <div
                    ref={ref}
                    className={`transition-all duration-[1200ms] ease-out transform ${isVisible ? 'opacity-100 translate-y-0 blur-none' : 'opacity-0 translate-y-8 blur-[8px]'}`}
                    style={{ transitionDelay: `${delay}ms` }}
                >
                    {children}
                </div>
            );
        };

        const Magnetic = ({ children, strength = 0.35 }) => {
            const ref = useRef(null);
            useEffect(() => {
                const element = ref.current;
                if (!element || window.matchMedia("(pointer: coarse)").matches) return;
                const handleMouseMove = (e) => {
                    const rect = element.getBoundingClientRect();
                    const centerX = rect.left + rect.width / 2;
                    const centerY = rect.top + rect.height / 2;
                    const deltaX = (e.clientX - centerX) * strength;
                    const deltaY = (e.clientY - centerY) * strength;
                    element.style.transform = `translate3d(${deltaX}px, ${deltaY}px, 0)`;
                };
                const handleMouseLeave = () => {
                    element.style.transform = `translate3d(0, 0, 0)`;
                };
                window.addEventListener('mousemove', handleMouseMove);
                element.addEventListener('mouseleave', handleMouseLeave);
                return () => {
                    window.removeEventListener('mousemove', handleMouseMove);
                    element.removeEventListener('mouseleave', handleMouseLeave);
                };
            }, [strength]);
            return <div ref={ref} className="transition-transform duration-300 ease-out">{children}</div>;
        };

        const LoadingScreen = ({ onComplete }) => {
            const [phase, setPhase] = useState(0); 
            useEffect(() => {
                document.body.style.overflow = 'hidden';
                const revealTimer = setTimeout(() => setPhase(1), 800);
                const splitTimer = setTimeout(() => setPhase(2), 2000);
                const completeTimer = setTimeout(() => {
                    document.body.style.overflow = 'auto';
                    onComplete();
                }, 2800);
                return () => {
                    clearTimeout(revealTimer);
                    clearTimeout(splitTimer);
                    clearTimeout(completeTimer);
                    document.body.style.overflow = 'auto';
                };
            }, [onComplete]);
            return (
                <div className="fixed inset-0 z-[150] pointer-events-none flex flex-col">
                    <div className={`absolute top-0 left-0 w-full h-[50vh] bg-nomad-pink transition-transform duration-[800ms] ease-[cubic-bezier(0.76,0,0.24,1)] border-b border-white/5 ${phase === 2 ? '-translate-y-full' : 'translate-y-0'}`} />
                    <div className={`absolute bottom-0 left-0 w-full h-[50vh] bg-nomad-pink transition-transform duration-[800ms] ease-[cubic-bezier(0.76,0,0.24,1)] border-t border-white/5 ${phase === 2 ? 'translate-y-full' : 'translate-y-0'}`} />
                    <div className={`absolute inset-0 flex items-center justify-center transition-opacity duration-500 ${phase === 2 ? 'opacity-0' : 'opacity-100'}`}>
                        <div className="flex items-center text-4xl md:text-5xl lg:text-7xl font-light text-white tracking-tight font-display lowercase overflow-hidden">
                            <span>n</span>
                            <div className={`transition-all duration-[1000ms] ease-[cubic-bezier(0.22,1,0.36,1)] overflow-hidden flex ${phase >= 1 ? 'max-w-[300px] opacity-100' : 'max-w-0 opacity-0'}`}>
                                <span>omad</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const SigninForm = () => {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = (e) => {
                e.preventDefault();
                setLoading(true);
                setTimeout(() => setLoading(false), 2000);
            };

            return (
                <div className="min-h-screen flex flex-col items-center justify-center px-6 py-20">
                    <FadeIn>
                        <div className="text-center mb-16">
                            <a href="index.html" className="inline-block mb-8">
                                <span className="font-display text-4xl md:text-5xl font-medium tracking-wide text-nomad-black lowercase">nomad</span>
                            </a>
                            <div className="flex flex-col items-center gap-4">
                                <span className="px-5 py-1.5 rounded-full border border-nomad-black/10 text-[10px] uppercase tracking-[0.3em] font-medium text-nomad-black/40">Partner Portal</span>
                                <h1 className="text-5xl md:text-6xl font-light tracking-tight text-nomad-black">
                                    Authenticate <i>Identity</i>
                                </h1>
                            </div>
                        </div>
                    </FadeIn>

                    <FadeIn delay={200}>
                        <div className="w-full max-w-md">
                            <form onSubmit={handleSubmit} className="space-y-8">
                                <div className="space-y-4">
                                    <div className="relative group">
                                        <label className="absolute -top-3 left-6 px-2 bg-nomad-cream text-[10px] uppercase tracking-widest font-bold text-nomad-black/30 transition-colors group-focus-within:text-nomad-pink">
                                            Identity / Email
                                        </label>
                                        <input
                                            type="email"
                                            required
                                            value={email}
                                            onChange={(e) => setEmail(e.target.value)}
                                            className="w-full bg-transparent border border-nomad-black/10 rounded-2xl px-6 py-4 text-nomad-black focus:outline-none focus:border-nomad-pink transition-colors font-light placeholder:text-nomad-black/10"
                                            placeholder="your@access.com"
                                        />
                                    </div>
                                    <div className="relative group">
                                        <label className="absolute -top-3 left-6 px-2 bg-nomad-cream text-[10px] uppercase tracking-widest font-bold text-nomad-black/30 transition-colors group-focus-within:text-nomad-pink">
                                            Secure Passkey
                                        </label>
                                        <input
                                            type="password"
                                            required
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            className="w-full bg-transparent border border-nomad-black/10 rounded-2xl px-6 py-4 text-nomad-black focus:outline-none focus:border-nomad-pink transition-colors font-light placeholder:text-nomad-black/10"
                                            placeholder="••••••••"
                                        />
                                        <button type="button" className="absolute right-6 top-1/2 -translate-y-1/2 text-[10px] uppercase tracking-widest font-bold text-nomad-pink hover:opacity-70 transition-opacity">
                                            Reset
                                        </button>
                                    </div>
                                </div>

                                <div className="flex items-center justify-between px-2">
                                    <label className="flex items-center gap-3 cursor-pointer group">
                                        <div className="relative w-10 h-6 bg-nomad-black/5 rounded-full transition-colors group-hover:bg-nomad-black/10">
                                            <input type="checkbox" className="sr-only peer" />
                                            <div className="absolute top-1 left-1 w-4 h-4 bg-white rounded-full transition-all peer-checked:translate-x-4 peer-checked:bg-nomad-pink" />
                                        </div>
                                        <span className="text-[10px] uppercase tracking-widest font-bold text-nomad-black/30">Keep synchronized</span>
                                    </label>
                                </div>

                                <button
                                    type="submit"
                                    disabled={loading}
                                    className="w-full bg-nomad-black text-white rounded-2xl py-5 text-sm font-bold uppercase tracking-[0.2em] hover:bg-nomad-pink transition-all active:scale-[0.98] disabled:opacity-70 flex items-center justify-center relative overflow-hidden group"
                                >
                                    <span className={loading ? 'opacity-0' : 'opacity-100 group-hover:translate-x-1 transition-transform'}>
                                        Authorize Access
                                    </span>
                                    {loading && (
                                        <div className="absolute inset-0 flex items-center justify-center">
                                            <div className="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin" />
                                        </div>
                                    )}
                                </button>
                            </form>

                            <div className="mt-12 text-center">
                                <p className="text-[10px] uppercase tracking-widest font-bold text-nomad-black/20 mb-6 italic">No credentials?</p>
                                <a href="index.html" className="inline-flex items-center gap-2 group">
                                    <span className="text-sm font-medium text-nomad-black hover:text-nomad-pink transition-colors">Return to platform</span>
                                    <svg className="w-4 h-4 text-nomad-pink transform group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16l-4-4m0 0l4-4m-4 4h18" />
                                    </svg>
                                </a>
                            </div>
                        </div>
                    </FadeIn>

                    <div className="mt-auto pt-20">
                        <div className="text-[10px] uppercase tracking-[0.3em] font-medium text-nomad-black/10 flex flex-col gap-2 items-center">
                            <p>© 2026 NOMAD NEUROSCIENCE LTD. All rights secured. <a href="privacy.html" className="ml-4 hover:text-nomad-pink transition-colors">Privacy Policy</a></p>
                            <p className="opacity-50 text-[8px] text-center">
                                Registered in England and Wales • Company № 16558472<br />
                                Registered Office: 71-75 Shelton Street, London, WC2H 9JQ
                            </p>
                            <p className="mt-4 pt-4 border-t border-nomad-black/5 opacity-50 text-[7px] leading-relaxed max-w-[280px] text-center uppercase tracking-wider">
                                <strong>Regulatory Status</strong>: Nomad is an investigational device, exclusively for clinical investigation. Not yet MHRA approved. Not for commercial sale.
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const lenis = new window.Lenis({
                    duration: 1.2,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                    smooth: true,
                });
                function raf(time) {
                    lenis.raf(time);
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);
                return () => lenis.destroy();
            }, []);

            return (
                <>
                    {loading && <LoadingScreen onComplete={() => setLoading(false)} />}
                    <div className={`transition-opacity duration-1000 ${loading ? 'opacity-0' : 'opacity-100'}`}>
                        <SigninForm />
                    </div>
                </>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>

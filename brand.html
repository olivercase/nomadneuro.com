<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Profile | Nomad</title>
    
    <!-- React & Libraries -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/bundled/lenis.min.js"></script>

    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        nomad: {
                            black: '#0A0A0A',
                            dark: '#1C1B1A',
                            base: '#FAFAFA',
                            cream: '#F5F5F0',
                            white: '#FFFFFF',
                            pink: '#FF1B8D',
                            magenta: '#E91E8C',
                        }
                    },
                    fontFamily: {
                        sans: ['Unica77 LL', 'Helvetica Neue', 'Arial', 'sans-serif'],
                        serif: ['Newsreader', 'Georgia', 'serif'],
                        display: ['Unica77 LL', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <style>
        @font-face {
            font-family: "Unica77 LL";
            src: url("fonts/Unica77 LL Cyrillic (RUS by damnxav)/Unica77LLCyr-Light.otf") format("opentype");
            font-weight: 300;
        }
        @font-face {
            font-family: "Unica77 LL";
            src: url("fonts/Unica77 LL Cyrillic (RUS by damnxav)/Unica77LLCyr-Regular.otf") format("opentype");
            font-weight: 400;
        }
        @font-face {
            font-family: "Unica77 LL";
            src: url("fonts/Unica77 LL Cyrillic (RUS by damnxav)/Unica77LLCyr-Bold.otf") format("opentype");
            font-weight: 700;
        }

        body {
            font-family: "Unica77 LL", sans-serif;
            -webkit-font-smoothing: antialiased;
            background-color: #F5F5F0;
            color: #0A0A0A;
        }

        .italic {
            font-family: 'Newsreader', Georgia, serif;
            font-style: italic;
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(255, 27, 141, 0.05), transparent 50%),
                        radial-gradient(circle at bottom left, rgba(255, 27, 141, 0.02), transparent 40%);
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 20s linear infinite;
        }

        .fade-mask {
            mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent);
        }
    </style>
</head>
<body class="bg-nomad-cream">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* --- DATA --- */
        const BRAND_DATA = {
            hero: {
                title: "Nomad",
                eyebrow: "Brand Identity",
                description: "Building the operating system for the human nervous system through minimalist precision and biological empathy.",
                bgImage: "/Users/olivercase/.gemini/antigravity/brain/e301c2da-7f8f-4768-b1c9-9357b78fda6d/nomad_brand_hero_bg_1773573817861.png"
            },
            sections: [
                {
                    id: "logos",
                    number: "01",
                    title: "The Wordmark",
                    description: "Our logo is a statement of clarity. Set in Unica77, it reflects the intersection of Swiss precision and modern neurotechnology.",
                    type: "logos",
                    items: [
                        { label: "nomad", theme: "light", filename: "nomad-wordmark-dark.svg", size: "4.2 KB", extension: "SVG", dimensions: "1650 × 400" },
                        { label: "nomad", theme: "dark", filename: "nomad-wordmark-light.svg", size: "4.2 KB", extension: "SVG", dimensions: "1650 × 400" }
                    ]
                },
                {
                    id: "colors",
                    number: "02",
                    title: "Color Palette",
                    description: "The colors of Nomad are rooted in nature and technology. Deep blacks for depth, clinical creams for trust, and vibrant pinks for the electrical pulse of life.",
                    type: "colors",
                    items: [
                        { name: "Nomad Black", hex: "#0A0A0A", rgb: "10, 10, 10", cmyk: "75, 68, 67, 90" },
                        { name: "Nomad Dark", hex: "#1C1B1A", rgb: "28, 27, 26", cmyk: "70, 65, 65, 80" },
                        { name: "Nomad Cream", hex: "#F5F5F0", rgb: "245, 245, 240", cmyk: "0, 0, 2, 4" },
                        { name: "Nomad Pink", hex: "#FF1B8D", rgb: "255, 27, 141", cmyk: "0, 95, 5, 0" },
                        { name: "Nomad Magenta", hex: "#E91E8C", rgb: "233, 30, 140", cmyk: "5, 95, 5, 0" }
                    ]
                },
                {
                    id: "typography",
                    number: "03",
                    title: "Typography",
                    description: "We value legibility and character. Unica77 provides a neutral, functional foundation, while Newsreader adds a human, editorial warmth.",
                    type: "typography",
                    items: [
                        {
                            family: "Unica77 LL",
                            style: "Primary Sans",
                            description: "The font of choice for structure. Its balanced proportions and clean terminals reflect Nomad's commitment to technological clarity.",
                            alphabet: "ABCDEFGHIJKLM NOPQRSTUVWXYZ"
                        },
                        {
                            family: "Newsreader",
                            style: "Secondary Serif",
                            description: "The voice of our humanity. Used for emphasis and long-form narrative, ensuring the patient remains at the heart of the science.",
                            alphabet: "Abcdefghijklm nopqrstuvwxyz",
                            italic: true
                        }
                    ]
                },
                {
                    id: "principles",
                    number: "04",
                    title: "Brand Principles",
                    description: "Our brand is more than visuals. It is the guiding philosophy behind every interaction, pixel, and pulse.",
                    type: "principles",
                    items: [
                        { title: "Minimalist Precision", description: "We eliminate noise. Every element must serve a purpose. We believe that simplicity is the ultimate sophistication in complex neurobiology." },
                        { title: "Biological Empathy", description: "Technology should feel like an extension of the self. We design with the body in mind, ensuring our innovations are as gentle as they are powerful." },
                        { title: "Technological Trust", description: "We lead with science. Our brand establishes authority through rigorous science, clinical safety, and absolute transparency." }
                    ]
                },
                {
                    id: "patterns",
                    number: "05",
                    title: "Patterns & Grids",
                    description: "Our visual language is reinforced by mathematical grids and organic textures, representing the fusion of data and biology.",
                    type: "patterns",
                    items: [
                        { name: "Nomad Grid", filename: "nomad-grid-system.svg", extension: "SVG", dimensions: "1920 × 1080", description: "The 12-column foundation for all layouts." },
                        { name: "Neural Grain", filename: "neural-texture.png", extension: "PNG", dimensions: "2560 × 1440", description: "Subtle organic noise mimicking neural activity." }
                    ]
                }
            ]
        };

        /* --- UTILS --- */
        const getContrastYIQ = (hexcolor) => {
            hexcolor = hexcolor.replace("#", "");
            const r = parseInt(hexcolor.substr(0, 2), 16);
            const g = parseInt(hexcolor.substr(2, 2), 16);
            const b = parseInt(hexcolor.substr(4, 2), 16);
            const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
            return (yiq >= 128) ? 'black' : 'white';
        };

        /* --- COMPONENTS --- */

        const Navbar = () => (
            <nav className="fixed top-0 left-0 w-full z-50 px-6 md:px-12 py-8 flex justify-between items-center mix-blend-difference text-white">
                <a href="index.html" className="font-display text-xl tracking-[0.2em] font-medium lowercase">nomad</a>
                <div className="flex gap-8 items-center text-xs uppercase tracking-[0.2em] font-medium opacity-60 hover:opacity-100 transition-opacity cursor-pointer">
                    <span>Explore</span>
                    <div className="w-6 h-[1px] bg-white"></div>
                </div>
            </nav>
        );

        const SectionHeader = ({ number, title, description }) => (
            <div className="flex flex-col md:flex-row gap-8 mb-16 pt-24 border-t border-black/5">
                <div className="flex-shrink-0 w-full md:w-64">
                    <div className="flex items-baseline gap-4 mb-2">
                        <span className="text-nomad-pink font-mono text-sm font-bold tracking-widest">{number}</span>
                        <h2 className="text-2xl font-display uppercase tracking-widest font-bold text-nomad-black leading-tight">{title}</h2>
                    </div>
                </div>
                <div className="flex-grow">
                    <p className="text-nomad-black/60 text-lg max-w-2xl leading-relaxed">{description}</p>
                </div>
            </div>
        );

        const ColorCard = ({ name, hex, rgb, cmyk }) => {
            const [copied, setCopied] = useState(false);
            const contrastColor = getContrastYIQ(hex);

            const copyHex = (e) => {
                e.stopPropagation();
                navigator.clipboard.writeText(hex);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            };

            const Label = ({ label, value }) => (
                <div className="flex gap-2">
                    <span className="text-[10px] font-bold uppercase opacity-40 w-12">{label}</span>
                    <span className="text-[10px] font-bold uppercase tracking-wider">{value}</span>
                </div>
            );

            return (
                <div 
                    className="group relative aspect-[1.6/1] rounded-2xl p-6 flex flex-col justify-center cursor-pointer transition-all duration-500 overflow-hidden"
                    style={{ backgroundColor: hex }}
                >
                    <div className={`space-y-0.5 z-10 transition-colors duration-500 ${contrastColor === 'white' ? 'text-white' : 'text-nomad-black'}`}>
                        <Label label="Name" value={name} />
                        <Label label="CMYK" value={cmyk} />
                        <Label label="RGB" value={rgb} />
                        <Label label="HEX" value={hex} />
                    </div>

                    <button 
                        onClick={copyHex}
                        className={`absolute right-6 top-1/2 -translate-y-1/2 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all duration-500 opacity-0 group-hover:opacity-100 scale-90 group-hover:scale-100 border ${
                            contrastColor === 'white' 
                            ? 'bg-white/10 text-white border-white/20 hover:bg-white/20' 
                            : 'bg-black/5 text-black border-black/10 hover:bg-black/10'
                        } backdrop-blur-md`}
                    >
                        {copied ? 'Copied' : 'Copy hex'}
                    </button>

                    {/* Subtle Overlay */}
                    <div className="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
                </div>
            );
        };

        const LogoBox = ({ label, theme, filename, size, extension, dimensions }) => (
            <div className="group space-y-4">
                <div className={`aspect-[16/9] rounded-3xl flex items-center justify-center border transition-all duration-700 ${
                    theme === 'dark' ? 'bg-nomad-black border-white/5' : 'bg-nomad-cream border-black/5'
                }`}>
                    <span className={`text-5xl md:text-7xl font-display tracking-[0.25em] font-medium lowercase group-hover:scale-110 transition-transform duration-700 ${
                        theme === 'dark' ? 'text-white' : 'text-nomad-black'
                    }`}>
                        {label}
                    </span>
                </div>
                <div className="flex justify-between items-center px-4 opacity-40 group-hover:opacity-100 transition-opacity">
                    <span className="text-[10px] font-mono tracking-wider uppercase">{filename}</span>
                    <span className="text-[10px] font-mono tracking-wider uppercase">{extension} • {dimensions}</span>
                </div>
            </div>
        );

        const PatternCard = ({ name, filename, extension, dimensions, description }) => (
            <div className="group space-y-6">
                <div className="aspect-video rounded-3xl bg-nomad-black border border-white/5 overflow-hidden relative">
                    {/* Placeholder for grid pattern */}
                    <div className="absolute inset-0 opacity-20 pointer-events-none" style={{ 
                        backgroundImage: 'radial-gradient(circle, rgba(255,27,141,0.2) 1px, transparent 1px)', 
                        backgroundSize: '30px 30px' 
                    }}></div>
                    <div className="absolute inset-0 flex items-center justify-center">
                        <span className="text-white/10 text-9xl font-display uppercase tracking-tighter select-none">{extension}</span>
                    </div>
                </div>
                <div className="space-y-1">
                    <div className="flex justify-between items-baseline">
                        <h4 className="text-sm font-bold uppercase tracking-widest text-nomad-black">{name}</h4>
                        <span className="text-[10px] font-mono text-nomad-black/30">{dimensions}</span>
                    </div>
                    <p className="text-xs text-nomad-black/50">{description}</p>
                </div>
            </div>
        );

        const AssetTable = ({ items }) => (
            <div className="w-full overflow-x-auto">
                <table className="w-full text-left border-collapse">
                    <thead>
                        <tr className="border-b border-black/5">
                            <th className="py-6 text-[10px] uppercase tracking-[0.3em] font-bold text-nomad-black/30">Asset Name</th>
                            <th className="py-6 text-[10px] uppercase tracking-[0.3em] font-bold text-nomad-black/30 hidden md:table-cell">Filename</th>
                            <th className="py-6 text-[10px] uppercase tracking-[0.3em] font-bold text-nomad-black/30">Size</th>
                            <th className="py-6 text-[10px] uppercase tracking-[0.3em] font-bold text-nomad-black/30 text-right">Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        {items.map((item, i) => (
                            <tr key={i} className="group border-b border-black/[0.02] hover:bg-black/[0.01] transition-colors">
                                <td className="py-8">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 rounded-lg bg-nomad-black flex items-center justify-center text-[10px] font-bold text-white uppercase">{item.extension}</div>
                                        <span className="text-sm font-medium text-nomad-black">{item.name}</span>
                                    </div>
                                </td>
                                <td className="py-8 text-xs font-mono text-nomad-black/40 hidden md:table-cell">{item.filename}</td>
                                <td className="py-8 text-xs font-mono text-nomad-black/40">{item.size}</td>
                                <td className="py-8 text-right">
                                    <button className="text-[10px] uppercase tracking-widest font-bold text-nomad-pink opacity-40 group-hover:opacity-100 Transition-all hover:scale-110">Download</button>
                                </td>
                            </tr>
                        ))}
                    </tbody>
                </table>
            </div>
        );

        const TypeShowcase = ({ family, style, description, alphabet, italic }) => (
            <div className="pb-24">
                <span className="text-[10px] uppercase tracking-[0.3em] font-bold text-nomad-black/20 mb-8 block">{style} — {family}</span>
                <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 items-end">
                    <h3 className={`text-6xl md:text-[8rem] font-light leading-[0.8] tracking-tighter ${italic ? 'italic font-serif' : 'font-display'}`}>
                        {alphabet.split(' ').map((line, i) => <React.Fragment key={i}>{line}<br/></React.Fragment>)}
                    </h3>
                    <p className={`text-2xl md:text-3xl font-light leading-relaxed text-black/60 ${italic ? 'italic font-serif' : 'font-display'}`}>
                        {description}
                    </p>
                </div>
            </div>
        );

        const PrincipleCard = ({ title, description }) => (
            <div className="p-12 border border-black/5 rounded-3xl bg-white/50 backdrop-blur-sm hover:border-nomad-pink/20 transition-all duration-700 group">
                <h3 className="text-2xl font-light mb-6 font-display uppercase tracking-wider group-hover:text-nomad-pink transition-colors">{title}</h3>
                <p className="text-nomad-black/50 leading-relaxed font-light">{description}</p>
            </div>
        );

        /* --- MAIN APP --- */

        const BrandPage = () => {
            useEffect(() => {
                const lenis = new Lenis({
                    duration: 1.2,
                    easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
                    smooth: true,
                });

                function raf(time) {
                    lenis.raf(time);
                    requestAnimationFrame(raf);
                }
                requestAnimationFrame(raf);
                return () => lenis.destroy();
            }, []);

            return (
                <main className="relative">
                    <Navbar />

                    {/* HERO */}
                    <section className="relative h-[90vh] flex items-center px-6 md:px-12 lg:px-24 bg-nomad-black overflow-hidden">
                        <div className="absolute inset-0 opacity-40">
                             <img src={BRAND_DATA.hero.bgImage} className="w-full h-full object-cover shrink-0" />
                        </div>
                        <div className="relative z-10 max-w-4xl">
                            <span className="text-nomad-pink font-mono text-xs font-bold tracking-[0.4em] uppercase mb-8 block opacity-0 animate-[fadeIn_1s_ease-out_forwards]">{BRAND_DATA.hero.eyebrow}</span>
                            <h1 className="text-6xl md:text-8xl lg:text-[10rem] font-light text-white font-display tracking-[-0.04em] leading-[0.9] mb-12 opacity-0 animate-[fadeIn_1s_ease-out_0.3s_forwards] uppercase">
                                {BRAND_DATA.hero.title}
                            </h1>
                            <p className="text-white/60 text-xl md:text-3xl max-w-2xl font-light leading-relaxed italic font-serif opacity-0 animate-[fadeIn_1s_ease-out_0.6s_forwards]">
                                {BRAND_DATA.hero.description}
                            </p>
                        </div>
                    </section>

                    {/* DYNAMIC SECTIONS */}
                    <div className="bg-white">
                        {BRAND_DATA.sections.map((section) => (
                            <section key={section.id} id={section.id} className={`py-48 px-6 md:px-12 lg:px-24 ${section.id === 'colors' || section.id === 'principles' ? 'bg-nomad-cream' : 'bg-white'}`}>
                                <div className="max-w-[1400px] mx-auto">
                                    <SectionHeader 
                                        number={section.number} 
                                        title={section.title} 
                                        description={section.description}
                                    />
                                    
                                    {section.type === 'logos' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {section.items.map((item, i) => <LogoBox key={i} {...item} />)}
                                        </div>
                                    )}

                                    {section.type === 'colors' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                            {section.items.map((item, i) => <ColorCard key={i} {...item} />)}
                                        </div>
                                    )}

                                    {section.type === 'typography' && (
                                        <div className="space-y-12">
                                            {section.items.map((item, i) => <TypeShowcase key={i} {...item} />)}
                                        </div>
                                    )}

                                    {section.type === 'principles' && (
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                                            {section.items.map((item, i) => <PrincipleCard key={i} {...item} />)}
                                        </div>
                                    )}

                                    {section.type === 'patterns' && (
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-12 lg:gap-24">
                                            {section.items.map((item, i) => <PatternCard key={i} {...item} />)}
                                        </div>
                                    )}
                                </div>
                            </section>
                        ))}
                    </div>

                    {/* FOOTER */}
                    <footer className="py-24 px-6 md:px-12 lg:px-24 bg-nomad-black text-white/40">
                        <div className="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-12 text-center md:text-left">
                            <span className="font-display text-lg tracking-[0.2em] font-medium lowercase text-white">nomad</span>
                            <div className="flex flex-wrap justify-center gap-12 text-[10px] uppercase tracking-[0.3em] font-medium">
                                <a href="index.html" className="hover:text-white transition-colors">Platform</a>
                                <a href="brand.html" className="hover:text-white transition-colors">Brand</a>
                                <a href="privacy.html" className="hover:text-white transition-colors">Privacy</a>
                                <a href="mailto:hello@nomadneuro.com" className="hover:text-white transition-colors">Contact</a>
                            </div>
                            <span className="text-[10px] uppercase tracking-widest">&copy; 2026 Nomad Neuroscience Ltd</span>
                        </div>
                    </footer>
                </main>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BrandPage />);
    </script>

        <style>
            @keyframes fadeIn {
                from { opacity: 0; transform: translateY(20px); }
                to { opacity: 1; transform: translateY(0); }
            }
        </style>
    </body>
    </html>
